<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Editor HTML - CKEditor 5</title>

  <script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    #container {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    #editor {
      min-height: 250px;
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 200px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <h2>Editor HTML (CKEditor 5)</h2>

  <div id="container">
    <div id="editor"></div>

    <button onclick="copyHTML()">Copiar HTML</button>

    <textarea id="output" placeholder="HTML ao vivo..." readonly></textarea>
  </div>

  <script>
    let editorInstance;
    
    ClassicEditor
      .create(document.querySelector('#editor'), {
        toolbar: [
          'bold',
          'italic',
          'underline',
          'strikethrough',
          '|',
          'heading',
          '|',
          'bulletedList',
          'numberedList',
          '|',
          'link',
          'undo',
          'redo'
        ]
      })
      .then(editor => {
        editorInstance = editor;
    
        // atualização em tempo real
        editor.model.document.on('change:data', () => {
          updateHTML();
        });
    
        updateHTML();
      })
      .catch(error => {
        console.error(error);
      });
    
      function copyHTML() {
        if (!editorInstance) {
          alert("Editor ainda não carregou.");
          return;
        }
      
        let html = editorInstance.getData();
      
        html = html
          .replace(/<strong>/g, '<span style="font-weight:bold;">')
          .replace(/<\/strong>/g, '</span>')
          .replace(/<b>/g, '<span style="font-weight:bold;">')
          .replace(/<\/b>/g, '</span>');
      
        navigator.clipboard.writeText(html)
          .then(() => alert("HTML copiado!"))
          .catch(err => {
            console.error(err);
            alert("Erro ao copiar HTML.");
          });
      }
  </script>

</body>
</html>
