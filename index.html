<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Editor HTML</title>

  <link rel="stylesheet" href="./ckeditor5/ckeditor5.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }

    #container {
      background: white;
      padding: 20px;
      border-radius: 8px;
    }

    #editor {
      min-height: 300px;
    }

    textarea {
      width: 100%;
      height: 220px;
      margin-top: 20px;
      font-family: monospace;
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>Editor HTML</h2>

  <div id="container">

    <div id="editor"></div>

    <button onclick="copyHTML()">
      Copiar HTML
    </button>

    <textarea id="output" readonly></textarea>

  </div>

  <script type="module">

    import {
      ClassicEditor
    } from './ckeditor5/ckeditor5.js';

    let editor;

    ClassicEditor
      .create(document.querySelector('#editor'))
      .then(newEditor => {

        editor = newEditor;

        editor.model.document.on('change:data', () => {

          document.getElementById('output').value =
            editor.getData();

        });

      })
      .catch(error => {
        console.error(error);
      });

    window.copyHTML = function () {

      const html =
        document.getElementById('output').value;

      navigator.clipboard.writeText(html)
        .then(() => {
          alert('HTML copiado!');
        });
    };

  </script>

</body>
</html>
