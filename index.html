<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Editor HTML - CKEditor 5</title>

  <script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    #container {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    #editor {
      min-height: 250px;
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 200px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <h2>Editor HTML (CKEditor 5)</h2>

  <div id="container">
    <div id="editor"></div>

    <button onclick="copyHTML()">Copiar HTML</button>

    <textarea id="output" readonly style="width:100%; height:200px; margin-top:15px;"></textarea>
  </div>

  <script>
  let editorInstance;
  
  ClassicEditor
    .create(document.querySelector('#editor'), {
      toolbar: [
        'heading',
        '|',
        'bold',
        'italic',
        'underline',
        '|',
        'bulletedList',
        'numberedList',
        '|',
        'undo',
        'redo'
      ]
      
    }      
    )
    .then(editor => {
      editorInstance = editor;
  
      // 🔥 live HTML seguro
      editor.model.document.on('change:data', () => {
        updateLiveHTML();
      });
  
      // inicializa já preenchido
      updateLiveHTML();
    })
    .catch(error => {
      console.error(error);
    });
  
  function updateLiveHTML() {
    if (!editorInstance) return;
  
    let html = editorInstance.getData();
  
    // conversão para sistema legado
    html = html
      .replace(/<strong>/g, '<span style="font-weight:bold;">')
      .replace(/<\/strong>/g, '</span>')
      .replace(/<b>/g, '<span style="font-weight:bold;">')
      .replace(/<\/b>/g, '</span>');
  
    const output = document.getElementById('output');
    if (output) output.value = html;
  }


  function copyHTML() {
    if (!editorInstance) {
      alert("Editor ainda não carregou");
      return;
    }
  
    let html = editorInstance.getData();
  
    html = html
      .replace(/<strong>/g, '<span style="font-weight:bold;">')
      .replace(/<\/strong>/g, '</span>')
      .replace(/<b>/g, '<span style="font-weight:bold;">')
      .replace(/<\/b>/g, '</span>');
  
    // fallback compatível (caso clipboard falhe)
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(html)
        .then(() => {
          alert("HTML copiado!");
        })
        .catch(() => {
          fallbackCopy(html);
        });
    } else {
      fallbackCopy(html);
    }
  }
  
  function fallbackCopy(text) {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);
  
    alert("HTML copiado (modo compatível)");
  }
  </script>

</body>
</html>
