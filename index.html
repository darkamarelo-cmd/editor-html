<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Editor HTML - CKEditor 5</title>

  <script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    #container {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    #editor {
      min-height: 250px;
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 200px;
      margin-top: 15px;
    }

    heading: {
      options: [
        { model: 'paragraph', title: 'Parágrafo', class: 'ck-heading_paragraph' },
        { model: 'heading1', view: 'h1', title: 'Título 1' },
        { model: 'heading2', view: 'h2', title: 'Título 2' },
        { model: 'heading3', view: 'h3', title: 'Título 3' }
      ]
    }

    #custom-toolbar {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }
    
    #custom-toolbar button {
      border: 1px solid #ccc;
      background: white;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 4px;
    }
    
    #custom-toolbar button:hover {
      background: #f0f0f0;
    }
    
  </style>
</head>

<body>

  <h2>Editor HTML (CKEditor 5)</h2>

    <div id="container">
      
    <div id="custom-toolbar">
    
      <button onclick="setListMode('numeric')">
        1.2.3.
      </button>
    
      <button onclick="setListMode('alpha')">
        A.B.C.
      </button>
    
      <button onclick="setListMode('roman')">
        I.II.III.
      </button>
    
    </div>
    
    <div id="editor"></div>

    <button onclick="copyHTML()">Copiar HTML</button>

    <textarea id="output" readonly style="width:100%; height:200px; margin-top:15px;"></textarea>
  </div>

  <script>
  let editorInstance;
  let currentListMode = 'numeric';
  
  ClassicEditor
    .create(document.querySelector('#editor'), {
      toolbar: [
        'heading',
        '|',
        'bold',
        'italic',
        'underline',
        '|',
        'bulletedList',
        'numberedList',
        '|',
        'undo',
        'redo'
      ]
      
    }      
    )
    .then(editor => {
      editorInstance = editor;
  
      // 🔥 live HTML seguro
      editor.model.document.on('change:data', () => {
        updateLiveHTML();
      });
  
      // inicializa já preenchido
      updateLiveHTML();
    })
    .catch(error => {
      console.error(error);
    });
  
  function updateLiveHTML() {
    if (!editorInstance) return;
  
    let html = editorInstance.getData();
  
    // conversão para sistema legado
    html = html
      .replace(/<strong>/g, '<span style="font-weight:bold;">')
      .replace(/<\/strong>/g, '</span>')
      .replace(/<b>/g, '<span style="font-weight:bold;">')
      .replace(/<\/b>/g, '</span>');

    html = convertLists(html);
    const output = document.getElementById('output');
    if (output) output.value = html;
  }


  function copyHTML() {
    if (!editorInstance) {
      alert("Editor ainda não carregou");
      return;
    }
  
    let html = editorInstance.getData();
  
    html = html
      .replace(/<strong>/g, '<span style="font-weight:bold;">')
      .replace(/<\/strong>/g, '</span>')
      .replace(/<b>/g, '<span style="font-weight:bold;">')
      .replace(/<\/b>/g, '</span>');

    html = convertLists(html);
    // fallback compatível (caso clipboard falhe)
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(html)
        .then(() => {
          alert("HTML copiado!");
        })
        .catch(() => {
          fallbackCopy(html);
        });
    } else {
      fallbackCopy(html);
    }
  }

  function convertLists(html) {
  
    // BULLET LIST
    html = html.replace(
      /<ul>(.*?)<\/ul>/gs,
      (match, content) => {
  
        const items = [...content.matchAll(/<li>(.*?)<\/li>/g)];
  
        return items.map(item => {
          return `<p>• ${item[1]}</p>`;
        }).join('');
      }
    );
  
    // NUMBERED LIST
    html = html.replace(
      /<ol>(.*?)<\/ol>/gs,
      (match, content) => {
  
        const items = [...content.matchAll(/<li>(.*?)<\/li>/g)];
  
        return items.map((item, index) => {
  
          let prefix = '';
  
          // NUMERIC
          if (currentListMode === 'numeric') {
            prefix = `${index + 1}.`;
          }
  
          // ALPHA
          else if (currentListMode === 'alpha') {
            prefix = `${String.fromCharCode(65 + index)}.`;
          }
  
          // ROMAN
          else if (currentListMode === 'roman') {
  
            const roman = [
              'I','II','III','IV','V',
              'VI','VII','VIII','IX','X'
            ];
  
            prefix = `${roman[index]}.`;
          }
  
          return `<p>${prefix} ${item[1]}</p>`;
  
        }).join('');
      }
    );
  
    return html;
  }

    
  function fallbackCopy(text) {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);
  
    alert("HTML copiado (modo compatível)");
  }


function setListMode(mode) {

  currentListMode = mode;

  document.querySelectorAll('#custom-toolbar button')
    .forEach(btn => btn.style.background = '');

  event.target.style.background = '#ddd';
}
    
  </script>  
</body>
</html>
