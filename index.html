<!DOCTYPE html>
<html lang="pt-br">
<head>

  <meta charset="UTF-8" />

  <title>Editor HTML</title>

  <!-- CKEditor Super Build -->
  <script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/super-build/ckeditor.js"></script>

  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }

    #container {
      background: white;
      padding: 20px;
      border-radius: 8px;
    }

    #editor {
      min-height: 300px;
    }

    textarea {
      width: 100%;
      height: 250px;
      margin-top: 20px;
      font-family: monospace;
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      cursor: pointer;
    }

  </style>

</head>

<body>

  <h2>Editor HTML</h2>

  <div id="container">

    <div id="editor"></div>

    <button onclick="copyHTML()">
      Copiar HTML
    </button>

    <textarea id="output" readonly></textarea>

  </div>

  <script>

    let editor;

    CKEDITOR.ClassicEditor
      .create(document.querySelector('#editor'))

      .then(newEditor => {

        editor = newEditor;

        // Atualização live do HTML
        editor.model.document.on('change:data', () => {

          const html = editor.getData();

          document.getElementById('output').value =
            html;

        });

      })

      .catch(error => {
        console.error(error);
      });



    function copyHTML() {

      const html =
        document.getElementById('output').value;

      navigator.clipboard.writeText(html)

        .then(() => {

          alert('HTML copiado!');

        })

        .catch(err => {

          console.error(err);

        });
    }

  </script>

</body>
</html>
